# netlify.toml — Palace Ottawa

[build]
  publish = "."

[[redirects]]
  from = "/reservations"
  to = "/contact.html?type=table"
  status = 301

[[redirects]]
  from = "/book"
  to = "/contact.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
